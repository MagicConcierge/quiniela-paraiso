<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Paraíso 🏆 Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2342;
  --navy2: #1a3560;
  --green: #1a5c38;
  --green2: #227a4a;
  --gold: #f0a500;
  --gold2: #ffd166;
  --red: #c0392b;
  --bg: #f0f2f8;
  --surface: #ffffff;
  --border: #dde1ee;
  --text: #1a1e2e;
  --muted: #6b7280;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(15,35,66,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: var(--navy);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
  gap: 1rem;
}
.loading-ball { font-size: 3.5rem; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: rgba(255,255,255,0.6); font-size: 0.9rem; font-weight: 500; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: none; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #0f2342 0%, #1a5c38 100%); padding: 1.5rem;
}
.login-card {
  background: #fff; border-radius: 24px; padding: 2rem 1.75rem;
  width: 100%; max-width: 400px; box-shadow: 0 30px 80px rgba(0,0,0,0.35);
}
.login-top { text-align: center; margin-bottom: 1.5rem; }
.login-trophy { font-size: 3.5rem; }
.login-title { font-family: 'Oswald', sans-serif; font-size: 1.9rem; color: var(--navy); margin-top: 4px; }
.login-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
.login-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
.member-btn {
  padding: 13px 8px; border-radius: 12px; border: 2px solid var(--border);
  font-size: 1rem; font-weight: 600; cursor: pointer; background: var(--bg);
  color: var(--text); transition: all 0.15s; text-align: center;
}
.member-btn:hover { border-color: var(--navy2); background: #eef2ff; transform: translateY(-1px); }
.member-btn.selected { border-color: var(--navy); background: var(--navy); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,35,66,0.3); }
.login-enter {
  width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #e09000);
  border: none; border-radius: 12px; font-family: 'Oswald', sans-serif; font-size: 1.1rem;
  font-weight: 700; color: #fff; cursor: pointer; transition: all 0.15s;
  box-shadow: 0 4px 14px rgba(240,165,0,0.4);
}
.login-enter:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(240,165,0,0.5); }
.login-enter:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }

/* ── APP HEADER ── */
#app { display: none; }
.app-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 0.9rem 1.25rem; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.25);
}
.logo { font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--gold); line-height: 1.1; }
.logo span { display: block; font-size: 0.68rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
.user-pill {
  display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 99px; padding: 6px 14px;
  cursor: pointer; transition: background 0.15s;
}
.user-pill:hover { background: rgba(255,255,255,0.18); }
.user-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }
.user-name { font-size: 0.82rem; font-weight: 600; color: #fff; }
.user-change { font-size: 0.65rem; color: rgba(255,255,255,0.4); }

/* ── SYNC BAR ── */
.sync-bar { background: var(--navy); padding: 3px 1.25rem 5px; font-size: 0.65rem; color: rgba(255,255,255,0.35); text-align: right; }
.sync-bar.syncing { color: var(--gold); }
.sync-bar.error { color: #e74c3c; }

/* ── SCOREBOARD ── */
.scoreboard-wrap { background: linear-gradient(135deg, var(--navy), var(--navy2)); padding: 0 1rem 1.25rem; }
.scores-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.scores-scroll::-webkit-scrollbar { display: none; }
.score-card {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 0.7rem 0.8rem; text-align: center; min-width: 72px;
  flex-shrink: 0; position: relative; transition: transform 0.15s;
}
.score-card.me { border-color: var(--gold); background: rgba(240,165,0,0.15); }
.score-card.leader { border-color: #2ecc71; }
.score-medal { position: absolute; top: 4px; right: 6px; font-size: 0.75rem; }
.score-name { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.3px; }
.score-pts { font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1; margin: 2px 0; }
.score-pts.gold { color: var(--gold); }
.score-lbl { font-size: 0.58rem; color: rgba(255,255,255,0.3); }

/* ── TABS ── */
.main { max-width: 600px; margin: 0 auto; padding: 1.25rem 0.9rem 5rem; }
.tabs-wrap { background: var(--surface); border-radius: 99px; padding: 4px; border: 1px solid var(--border); display: flex; gap: 3px; margin-bottom: 1.25rem; box-shadow: var(--shadow); }
.tab { flex: 1; padding: 8px 4px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.15s; text-align: center; white-space: nowrap; }
.tab.active { background: var(--navy); color: #fff; box-shadow: 0 2px 8px rgba(15,35,66,0.3); }
.tab:hover:not(.active) { background: var(--bg); color: var(--text); }
.phase-panel { display: none; }
.phase-panel.active { display: block; }

/* ── DATE DIVIDER ── */
.date-divider {
  display: flex; align-items: center; gap: 10px; margin: 1rem 0 0.6rem;
}
.date-divider-line { flex: 1; height: 1px; background: var(--border); }
.date-divider-label {
  font-size: 0.72rem; font-weight: 700; color: var(--navy); text-transform: uppercase;
  letter-spacing: 0.8px; background: var(--bg); padding: 0 4px; white-space: nowrap;
}

/* ── MATCH CARD ── */
.match-card {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.15s;
}
.match-card:hover { box-shadow: 0 4px 20px rgba(15,35,66,0.12); }
.match-card.has-result { border-color: #c8dac8; }

/* Match header */
.match-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px 0; font-size: 0.65rem; color: var(--muted); font-weight: 600;
}
.match-group-badge {
  background: var(--navy); color: #fff; font-size: 0.6rem; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.5px;
}
.match-time { font-size: 0.65rem; color: var(--muted); }

/* Teams row */
.teams-row {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center;
  padding: 10px 14px 8px;
}
.team-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.team-flag { font-size: 1.6rem; line-height: 1; }
.team-name-big { font-size: 0.82rem; font-weight: 700; color: var(--text); text-align: center; line-height: 1.2; }
.vs-bubble {
  width: 34px; height: 34px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800; color: var(--muted); flex-shrink: 0;
}
.vs-bubble.has-result { background: var(--green); border-color: var(--green); color: #fff; font-size: 0.9rem; font-weight: 900; }

/* Result selector */
.result-row {
  padding: 0 14px 10px; display: flex; align-items: center; gap: 8px;
}
.result-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.result-btns { display: flex; gap: 6px; }
.result-btn {
  padding: 7px 16px; border-radius: 8px; border: 2px solid var(--border);
  font-size: 0.85rem; font-weight: 800; cursor: pointer; background: var(--bg);
  color: var(--muted); transition: all 0.12s; font-family: 'Inter', sans-serif;
}
.result-btn:hover { border-color: var(--navy); background: #eef2ff; }
.result-btn.active-1 { background: var(--green); border-color: var(--green); color: #fff; }
.result-btn.active-X { background: var(--navy); border-color: var(--navy); color: #fff; }
.result-btn.active-2 { background: var(--red); border-color: var(--red); color: #fff; }

/* Predictions grid */
.preds-area { border-top: 1px solid var(--border); padding: 10px 14px 12px; background: #fafbff; }
.preds-title { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.preds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 6px; }
.pred-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--surface); border-radius: 10px; padding: 8px 6px;
  border: 1.5px solid var(--border); transition: all 0.12s; position: relative;
}
.pred-item.is-me { border-color: var(--navy2); background: #f0f4ff; }
.pred-item.correct { border-color: var(--gold); background: #fffbf0; }
.pred-name { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.pred-name.is-me { color: var(--navy); }
.pred-btn-big {
  width: 100%; padding: 7px 4px; border-radius: 8px; border: 2px solid var(--border);
  font-size: 0.9rem; font-weight: 800; cursor: pointer; background: var(--bg);
  color: var(--muted); transition: all 0.12s; font-family: 'Inter', sans-serif; text-align: center;
}
.pred-btn-big.sel-1 { background: var(--green); border-color: var(--green); color: #fff; }
.pred-btn-big.sel-X { background: var(--navy); border-color: var(--navy); color: #fff; }
.pred-btn-big.sel-2 { background: var(--red); border-color: var(--red); color: #fff; }
.pred-btn-big.other { cursor: default; opacity: 0.7; }
.pred-pts { font-size: 0.68rem; font-weight: 800; color: transparent; height: 14px; }
.pred-pts.earned { color: var(--green); }
.correct-star { position: absolute; top: -5px; right: -5px; font-size: 0.75rem; }

/* Phase totals */
.phase-totals {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 12px 14px; margin-top: 4px; box-shadow: var(--shadow);
}
.phase-totals-title { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.totals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; }
.total-item { text-align: center; padding: 8px 4px; border-radius: 10px; background: var(--bg); }
.total-item.me-item { background: linear-gradient(135deg, var(--navy), var(--navy2)); }
.total-name { font-size: 0.62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
.total-name.me-n { color: rgba(255,255,255,0.7); }
.total-pts { font-family: 'Oswald', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); }
.total-pts.me-p { color: var(--gold); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--navy); color: #fff; padding: 12px 22px; border-radius: 99px;
  font-size: 0.85rem; font-weight: 600; z-index: 9998; opacity: 0;
  transition: all 0.3s; pointer-events: none; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CONFETTI ── */
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

/* ── MEDALLERO ── */
.medallero-wrap { padding: 0.5rem 0 1.5rem; }
.medallero-title {
  text-align: center; font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700;
  color: var(--navy); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1.5rem;
}
.podium {
  display: flex; align-items: flex-end; justify-content: center; gap: 8px;
  margin-bottom: 1.5rem; padding: 0 0.5rem;
}
.podium-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; max-width: 130px; }
.podium-avatar {
  width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 1.5rem; font-weight: 800; color: #fff;
  font-family: 'Oswald', sans-serif; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  border: 3px solid #fff;
}
.podium-name { font-size: 0.78rem; font-weight: 700; color: var(--text); text-align: center; }
.podium-pts-label { font-family: 'Oswald', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); }
.podium-pts-sub { font-size: 0.62rem; color: var(--muted); margin-top: -4px; }
.podium-base {
  width: 100%; border-radius: 10px 10px 0 0; display: flex; align-items: center;
  justify-content: center; font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700;
}
.podium-base-1 { height: 90px; background: linear-gradient(160deg,#f0a500,#ffd166); color: #fff; }
.podium-base-2 { height: 65px; background: linear-gradient(160deg,#8e9eab,#bdc3c7); color: #fff; }
.podium-base-3 { height: 45px; background: linear-gradient(160deg,#c97b44,#e6a96a); color: #fff; }

.rest-list { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.rest-item {
  display: flex; align-items: center; gap: 12px; padding: 11px 16px;
  border-bottom: 1px solid var(--border);
}
.rest-item:last-child { border-bottom: none; }
.rest-rank { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 700; color: var(--muted); width: 22px; text-align: center; }
.rest-name { flex: 1; font-size: 0.88rem; font-weight: 600; color: var(--text); }
.rest-pts { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--navy); }
.rest-pts-lbl { font-size: 0.62rem; color: var(--muted); }
.rest-item.is-me .rest-name { color: var(--navy); }
.rest-item.is-me { background: #f0f4ff; }

.medallero-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem;
}
.stat-card {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 12px 14px; box-shadow: var(--shadow);
}
.stat-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.stat-value { font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-top: 2px; }
.stat-sub { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

/* ── HOY PANEL ── */
.hoy-hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, var(--green) 100%);
  border-radius: var(--radius); padding: 1.5rem 1.25rem; margin-bottom: 1rem;
  text-align: center; position: relative; overflow: hidden;
}
.hoy-hero::before {
  content: "⚽"; position: absolute; font-size: 8rem; opacity: 0.06;
  top: -1rem; right: -1rem; line-height: 1;
}
.hoy-fecha {
  font-size: 0.72rem; font-weight: 700; color: var(--gold); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 6px;
}
.hoy-count {
  font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; color: #fff; line-height: 1.1;
}
.hoy-count span { color: var(--gold); }
.hoy-sub { font-size: 0.78rem; color: rgba(255,255,255,0.6); margin-top: 4px; }

.aliento-card {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 1.1rem 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow);
  display: flex; align-items: flex-start; gap: 12px;
}
.aliento-icon { font-size: 1.8rem; flex-shrink: 0; margin-top: 2px; }
.aliento-text { font-size: 0.88rem; font-weight: 500; color: var(--text); line-height: 1.5; }
.aliento-text.loading-ai { color: var(--muted); font-style: italic; }

.curiosidad-card {
  background: linear-gradient(135deg, #fff8e7, #fffdf0); border-radius: var(--radius);
  border: 1px solid #f0d98a; padding: 1.1rem 1.25rem; margin-bottom: 1.25rem;
  box-shadow: var(--shadow);
}
.curiosidad-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.curiosidad-icon { font-size: 1.2rem; }
.curiosidad-label { font-size: 0.68rem; font-weight: 800; color: #8a6000; text-transform: uppercase; letter-spacing: 1px; }
.curiosidad-text { font-size: 0.85rem; color: var(--text); line-height: 1.55; font-weight: 500; }
.curiosidad-text.loading-ai { color: var(--muted); font-style: italic; }

.hoy-no-partidos {
  text-align: center; padding: 3rem 1rem; color: var(--muted);
}
.hoy-no-partidos .emoji { font-size: 3rem; margin-bottom: 0.75rem; }
.hoy-no-partidos p { font-size: 0.9rem; font-weight: 500; }

@media (max-width: 400px) {
  .preds-grid { grid-template-columns: repeat(3, 1fr); }
  .member-btn { font-size: 0.9rem; padding: 11px 6px; }
}
</style>
</head>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-top">
      <div class="login-trophy">🏆</div>

      <div class="login-sub">Mundial 2026 · ¿Quién eres?</div>

  <main class="main">

    <div id="panels"></div>
  </main>
</div>

// ── STATE ──
let currentUser = null;
let dbState = {};
let unsubscribe = null;

// ── LOGIN ──
window.doLogin = () => {
  const sel = document.querySelector(".member-btn.selected");
  if (!sel) return;
  currentUser = sel.dataset.name;
  localStorage.setItem("qp2_user", currentUser);
  showApp();
};

window.logout = () => {
  localStorage.removeItem("qp2_user");
  currentUser = null;
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.querySelectorAll(".member-btn").forEach(b => b.classList.remove("selected"));
  document.getElementById("login-btn").disabled = true;
};

window.selectMember = btn => {
  document.querySelectorAll(".member-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  document.getElementById("login-btn").disabled = false;
};

function buildLoginScreen() {
  document.getElementById("member-grid").innerHTML = MEMBERS.map(m =>
    `<button class="member-btn" data-name="${m}" onclick="selectMember(this)">${m}</button>`
  ).join("");
}

// ── SHOW APP ──
function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("user-badge-name").textContent = currentUser;
  buildTabs();
  subscribeDb();
}

function buildTabs() {
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");
  tabsEl.innerHTML = ""; panelsEl.innerHTML = "";

  // HOY tab first
  const hoyTab = document.createElement("button");
  hoyTab.className = "tab active";
  hoyTab.innerHTML = "🗓️ Hoy"; hoyTab.dataset.id = "hoy";
  hoyTab.onclick = () => setTab("hoy");
  tabsEl.appendChild(hoyTab);
  const hoyPanel = document.createElement("div");
  hoyPanel.className = "phase-panel active"; hoyPanel.id = "panel-hoy";
  panelsEl.appendChild(hoyPanel);

  // MEDALLERO tab
  const medTab = document.createElement("button");
  medTab.className = "tab";
  medTab.innerHTML = "🏅 Medallero"; medTab.dataset.id = "medallero";
  medTab.onclick = () => setTab("medallero");
  tabsEl.appendChild(medTab);
  const medPanel = document.createElement("div");
  medPanel.className = "phase-panel"; medPanel.id = "panel-medallero";
  panelsEl.appendChild(medPanel);

  PHASES.forEach((ph) => {
    const tab = document.createElement("button");
    tab.className = "tab";
    tab.innerHTML = ph.label; tab.dataset.id = ph.id;
    tab.onclick = () => setTab(ph.id);
    tabsEl.appendChild(tab);

    const panel = document.createElement("div");
    panel.className = "phase-panel";
    panel.id = "panel-" + ph.id;
    panelsEl.appendChild(panel);
  });
}

function setTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.id === id));
  document.querySelectorAll(".phase-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
}

// ── FIREBASE ──
function subscribeDb() {
  const dbRef = ref(db, "quiniela");
  unsubscribe = onValue(dbRef, snap => {
    dbState = snap.val() || {};
    renderAll();
    setSyncStatus("online");
  }, () => setSyncStatus("error"));
}

function setSyncStatus(s) {
  const bar = document.getElementById("sync-bar");
  if (s === "online")  { bar.textContent = "● En línea · cambios en tiempo real"; bar.className = "sync-bar"; }
  if (s === "syncing") { bar.textContent = "↑ Guardando..."; bar.className = "sync-bar syncing"; }
  if (s === "error")   { bar.textContent = "✕ Sin conexión"; bar.className = "sync-bar error"; }
}

function getMData(phId, mi) {
  return (dbState[phId] && dbState[phId][mi]) ? dbState[phId][mi] : { real: "", preds: {} };
}

// ── TOTALS ──
function getPhTotals(ph) {
  return MEMBERS.map(n => ph.matches.reduce((a, _, mi) => {
    const m = getMData(ph.id, mi);
    return a + (m.real && m.preds && m.preds[n] && m.real === m.preds[n] ? PTS : 0);
  }, 0));
}

function getAllTotals() {
  return MEMBERS.map((n, i) => PHASES.reduce((acc, ph) => acc + getPhTotals(ph)[i], 0));
}

// ── RENDER ALL ──
function renderAll() {
  renderScoreboard();
  renderHoy();
  renderMedallero();
  PHASES.forEach(ph => renderPhase(ph));
}

function renderScoreboard() {
  const totals = getAllTotals();
  const max = Math.max(...totals);
  const sorted = totals.map((v, i) => ({v, i})).sort((a, b) => b.v - a.v);
  const medals = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣","🔟","1️⃣1️⃣"];
  document.getElementById("scoreboard").innerHTML = sorted.map(({v, i}) => {
    const n = MEMBERS[i], isMe = n === currentUser, rank = sorted.findIndex(x => x.i === i);
    return `<div class="score-card ${isMe?'me':''} ${v===max&&max>0&&!isMe?'leader':''}">
      <span class="score-medal">${medals[rank]}</span>
      <div class="score-name">${n}</div>
      <div class="score-pts ${isMe?'gold':''}">${v}</div>
      <div class="score-lbl">pts</div>
    </div>`;
  }).join("");
}

function renderPhase(ph) {
  const panel = document.getElementById("panel-" + ph.id);
  if (!panel) return;

  // Group by date
  const byDate = {};
  ph.matches.forEach((m, i) => {
    const d = m.f || "—";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push({m, i});
  });

  let html = "";
  Object.entries(byDate).forEach(([date, items]) => {
    html += `<div class="date-divider"><div class="date-divider-line"></div><div class="date-divider-label">📅 ${date}</div><div class="date-divider-line"></div></div>`;
    items.forEach(({m, i}) => {
      const mData = getMData(ph.id, i);
      const real = mData.real || "";
      const preds = mData.preds || {};

      // Prediction cells
      const predsHtml = MEMBERS.map(n => {
        const v = preds[n] || "";
        const isMe = n === currentUser;
        const isProxy = !isMe && canActAs(n);
        const canEdit = isMe || isProxy;
        const correct = real && v && real === v;
        const pts = correct ? `+${PTS}` : "";
        if (canEdit) {
          return `<div class="pred-item ${isMe?'is-me':''} ${correct?'correct':''}">
            ${correct ? '<span class="correct-star">⭐</span>' : ''}
            <div class="pred-name ${isMe?'is-me':''}">${n}${isProxy?' ✏️':''}</div>
            <button class="pred-btn-big ${v?'sel-'+v:''}" onclick="window.cyclePred('${ph.id}',${i},'${n}')">${v||"?"}</button>
            <div class="pred-pts ${correct?'earned':''}">${pts||" "}</div>
          </div>`;
        } else {
          return `<div class="pred-item ${correct?'correct':''}">
            ${correct ? '<span class="correct-star">⭐</span>' : ''}
            <div class="pred-name">${n.substring(0,6)}</div>
            <div class="pred-btn-big other ${v?'sel-'+v:''}" style="cursor:default;display:flex;align-items:center;justify-content:center;font-size:0.88rem;${!v?'opacity:0.25;border-style:dashed':''}">${v||"·"}</div>
            <div class="pred-pts ${correct?'earned':''}">${pts||" "}</div>
          </div>`;
        }
      }).join("");

      // Result buttons
      const rBtns = ["1","X","2"].map(val =>
        `<button class="result-btn ${real===val?'active-'+val:''}" onclick="window.setReal('${ph.id}',${i},'${real===val?'':val}')">${val}</button>`
      ).join("");

      const gLabel = m.g ? `<span class="match-group-badge">Grupo ${m.g}</span>` : `<span class="match-group-badge">${ph.label.replace(/[^\w\s]/gi,'').trim()}</span>`;

      html += `<div class="match-card ${real?'has-result':''}">
        <div class="match-header">
          ${gLabel}
          <span class="match-time">⏰ ${m.h||''} hora MX</span>
        </div>
        <div class="teams-row">
          <div class="team-block">
            <div class="team-flag">${flag(m.l)}</div>
            <div class="team-name-big">${m.l}</div>
          </div>
          <div class="vs-bubble ${real?'has-result':''}">${real||"VS"}</div>
          <div class="team-block">
            <div class="team-flag">${flag(m.v)}</div>
            <div class="team-name-big">${m.v}</div>
          </div>
        </div>
        <div class="result-row">
          <div class="result-label">Resultado:</div>
          <div class="result-btns">${rBtns}</div>
          ${real ? `<span style="font-size:0.7rem;color:var(--green);font-weight:700;margin-left:4px">✓ Registrado</span>` : ''}
        </div>
        <div class="preds-area">
          <div class="preds-title">Predicciones de la familia</div>
          <div class="preds-grid">${predsHtml}</div>
        </div>
      </div>`;
    });
  });

  // Phase totals
  const pts = getPhTotals(ph);
  const totalsHtml = MEMBERS.map((n, i) => `
    <div class="total-item ${n===currentUser?'me-item':''}">
      <div class="total-name ${n===currentUser?'me-n':''}">${n.substring(0,6)}</div>
      <div class="total-pts ${n===currentUser?'me-p':''}">${pts[i]}</div>
    </div>`).join("");

  html += `<div class="phase-totals">
    <div class="phase-totals-title">Puntos en esta fase</div>
    <div class="totals-grid">${totalsHtml}</div>
  </div>`;

  panel.innerHTML = html;
}

// ── MEDALLERO ─────────────────────────────────────────────────────────────────
function renderMedallero() {
  const panel = document.getElementById("panel-medallero");
  if (!panel) return;

  const totals = getAllTotals();
  const sorted = totals.map((v, i) => ({v, i, name: MEMBERS[i]})).sort((a, b) => b.v - a.v);

  // Total partidos jugados (con resultado)
  let totalJugados = 0, totalAciertos = 0;
  PHASES.forEach(ph => ph.matches.forEach((_, mi) => {
    const m = getMData(ph.id, mi);
    if (m.real) { totalJugados++; MEMBERS.forEach(n => { if (m.preds && m.preds[n] === m.real) totalAciertos++; }); }
  }));

  const avatarColors = ["#e74c3c","#3498db","#2ecc71","#9b59b6","#f39c12","#1abc9c","#e67e22","#e91e63","#00bcd4","#8bc34a","#ff5722"];
  const getColor = (i) => avatarColors[i % avatarColors.length];
  const getInitial = (name) => name[0].toUpperCase();

  // Top 3 podium — order: 2nd, 1st, 3rd visually
  const top = sorted.slice(0, 3);
  const podiumOrder = top.length >= 3 ? [top[1], top[0], top[2]] : top.length === 2 ? [top[1], top[0]] : [top[0]];
  const podiumBase = ["podium-base-2","podium-base-1","podium-base-3"];
  const podiumPos = top.length >= 3 ? [1,0,2] : [1,0]; // index in top[] for each visual slot
  const podiumNums = ["2","1","3"];
  const podiumEmojis = ["🥈","🥇","🥉"];

  const podiumHtml = podiumOrder.map((p, vi) => {
    if (!p) return "";
    const origPos = top.indexOf(p); // 0,1,2
    const baseClass = top.length >= 3 ? podiumBase[vi] : podiumBase[vi];
    const isMe = p.name === currentUser;
    return `<div class="podium-slot">
      <div class="podium-avatar" style="background:${getColor(p.i)};${isMe?'box-shadow:0 0 0 3px var(--gold),0 4px 16px rgba(0,0,0,0.25)':''}">${getInitial(p.name)}</div>
      <div class="podium-name">${p.name}${isMe?' 👈':''}</div>
      <div class="podium-pts-label">${p.v}</div>
      <div class="podium-pts-sub">pts</div>
      <div class="podium-base ${baseClass}">${podiumEmojis[vi]}</div>
    </div>`;
  }).join("");

  // Rest (4th+)
  const restHtml = sorted.slice(3).map((p, ri) => {
    const isMe = p.name === currentUser;
    return `<div class="rest-item ${isMe?'is-me':''}">
      <div class="rest-rank">${ri+4}</div>
      <div class="podium-avatar" style="background:${getColor(p.i)};width:34px;height:34px;font-size:0.9rem;flex-shrink:0">${getInitial(p.name)}</div>
      <div class="rest-name">${p.name}${isMe?' 👈':''}</div>
      <div style="text-align:right"><div class="rest-pts">${p.v}</div><div class="rest-pts-lbl">pts</div></div>
    </div>`;
  }).join("");

  // My position
  const myRank = sorted.findIndex(s => s.name === currentUser) + 1;
  const myPts = totals[MEMBERS.indexOf(currentUser)];
  const leader = sorted[0];
  const diff = leader.v - myPts;

  const statsHtml = `<div class="medallero-stats">
    <div class="stat-card">
      <div class="stat-label">Tu posición</div>
      <div class="stat-value">#${myRank} de ${MEMBERS.length}</div>
      <div class="stat-sub">${myPts} puntos acumulados</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">${diff === 0 ? '¡Vas primero! 🏆' : 'Al líder te faltan'}</div>
      <div class="stat-value">${diff === 0 ? myPts+'pts' : diff+' pts'}</div>
      <div class="stat-sub">${diff === 0 ? 'Sigue así' : `${leader.name} lleva ${leader.v} pts`}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Partidos jugados</div>
      <div class="stat-value">${totalJugados}</div>
      <div class="stat-sub">de ${PHASES.reduce((a,ph)=>a+ph.matches.length,0)} totales</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Aciertos familia</div>
      <div class="stat-value">${totalAciertos}</div>
      <div class="stat-sub">entre todos 🎯</div>
    </div>
  </div>`;

  panel.innerHTML = `<div class="medallero-wrap">
    <div class="medallero-title">🏅 Medallero Familiar</div>
    <div class="podium">${podiumHtml}</div>
    ${sorted.length > 3 ? `<div class="rest-list">${restHtml}</div>` : ''}
    ${statsHtml}
  </div>`;
}

// ── HOY ──────────────────────────────────────────────────────────────────────
// Current date in Mexico City time (UTC-6)
function getMexicoDateStr() {
  const now = new Date();
  const mxOffset = -6 * 60; // UTC-6
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const mxDate = new Date(utc + mxOffset * 60000);
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return `${months[mxDate.getMonth()]} ${mxDate.getDate()}`;
}

function getTodayMatches() {
  const today = getMexicoDateStr();
  const allMatches = [];
  PHASES.forEach(ph => {
    ph.matches.forEach((m, i) => {
      if (m.f && m.f === today) {
        allMatches.push({ ph, m, i });
      }
    });
  });
  return allMatches;
}

let aiAlreadyLoaded = false; // avoid re-fetching on every Firebase update

async function renderHoy() {
  const panel = document.getElementById("panel-hoy");
  if (!panel) return;

  const today = getMexicoDateStr();
  const todayMatches = getTodayMatches();

  if (todayMatches.length === 0) {
    panel.innerHTML = `<div class="hoy-no-partidos">
      <div class="emoji">😴</div>
      <p>No hay partidos hoy (${today})</p>
      <p style="margin-top:6px;font-size:0.78rem">¡Descansa y prepárate para mañana!</p>
    </div>`;
    aiAlreadyLoaded = false;
    return;
  }

  // Hero
  const teamNames = [...new Set(todayMatches.flatMap(({m}) => [m.l, m.v]))];
  const heroHtml = `<div class="hoy-hero">
    <div class="hoy-fecha">📅 ${today} · Hora México</div>
    <div class="hoy-count"><span>${todayMatches.length}</span> partido${todayMatches.length>1?'s':''} hoy</div>
    <div class="hoy-sub">${teamNames.slice(0,6).join(' · ')}${teamNames.length>6?' · ...':''}</div>
  </div>`;

  // Aliento placeholder
  const alientoPh = `<div class="aliento-card" id="aliento-card">
    <div class="aliento-icon">💬</div>
    <div class="aliento-text loading-ai" id="aliento-text">Generando mensaje de la quiniela...</div>
  </div>`;

  // Curiosidad placeholder
  const curioPh = `<div class="curiosidad-card" id="curiosidad-card">
    <div class="curiosidad-header"><div class="curiosidad-icon">🧠</div><div class="curiosidad-label">¿Sabías que...?</div></div>
    <div class="curiosidad-text loading-ai" id="curiosidad-text">Buscando dato curioso del día...</div>
  </div>`;

  // Match cards for today
  let matchesHtml = "";
  todayMatches.forEach(({ph, m, i}) => {
    const mData = getMData(ph.id, i);
    const real = mData.real || "";
    const preds = mData.preds || {};
    const predsHtml = MEMBERS.map(n => {
      const v = preds[n] || "";
      const isMe = n === currentUser;
      const isProxy = !isMe && canActAs(n);
      const canEdit = isMe || isProxy;
      const correct = real && v && real === v;
      const pts = correct ? `+${PTS}` : "";
      if (canEdit) {
        return `<div class="pred-item ${isMe?'is-me':''} ${correct?'correct':''}">
          ${correct ? '<span class="correct-star">⭐</span>' : ''}
          <div class="pred-name ${isMe?'is-me':''}">${n}${isProxy?' ✏️':''}</div>
          <button class="pred-btn-big ${v?'sel-'+v:''}" onclick="window.cyclePred('${ph.id}',${i},'${n}')">${v||"?"}</button>
          <div class="pred-pts ${correct?'earned':''}">${pts||" "}</div>
        </div>`;
      } else {
        return `<div class="pred-item ${correct?'correct':''}">
          ${correct ? '<span class="correct-star">⭐</span>' : ''}
          <div class="pred-name">${n.substring(0,6)}</div>
          <div class="pred-btn-big other ${v?'sel-'+v:''}" style="cursor:default;display:flex;align-items:center;justify-content:center;font-size:0.88rem;${!v?'opacity:0.25;border-style:dashed':''}">${v||"·"}</div>
          <div class="pred-pts ${correct?'earned':''}">${pts||" "}</div>
        </div>`;
      }
    }).join("");
    const rBtns = ["1","X","2"].map(val =>
      `<button class="result-btn ${real===val?'active-'+val:''}" onclick="window.setReal('${ph.id}',${i},'${real===val?'':val}')">${val}</button>`
    ).join("");
    const gLabel = m.g ? `<span class="match-group-badge">Grupo ${m.g}</span>` : `<span class="match-group-badge">${ph.label.replace(/[^\w\s]/gi,'').trim()}</span>`;
    matchesHtml += `<div class="match-card ${real?'has-result':''}">
      <div class="match-header">${gLabel}<span class="match-time">⏰ ${m.h||''} hora MX</span></div>
      <div class="teams-row">
        <div class="team-block"><div class="team-flag">${flag(m.l)}</div><div class="team-name-big">${m.l}</div></div>
        <div class="vs-bubble ${real?'has-result':''}">${real||"VS"}</div>
        <div class="team-block"><div class="team-flag">${flag(m.v)}</div><div class="team-name-big">${m.v}</div></div>
      </div>
      <div class="result-row">
        <div class="result-label">Resultado:</div>
        <div class="result-btns">${rBtns}</div>
        ${real ? `<span style="font-size:0.7rem;color:var(--green);font-weight:700;margin-left:4px">✓ Registrado</span>` : ''}
      </div>
      <div class="preds-area">
        <div class="preds-title">Predicciones de la familia</div>
        <div class="preds-grid">${predsHtml}</div>
      </div>
    </div>`;
  });

  panel.innerHTML = heroHtml + alientoPh + curioPh + matchesHtml;

  // Call AI only once per day view
  if (!aiAlreadyLoaded) {
    aiAlreadyLoaded = true;
    loadAIContent(todayMatches, today);
  }
}

async function loadAIContent(todayMatches, today) {
  const matchList = todayMatches.map(({m}) => `${m.l} vs ${m.v} (Grupo ${m.g||'—'}, ${m.h} hora MX)`).join(", ");
  const memberName = currentUser;

  // Aliento message
  try {
    const r1 = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 120,
        system: "Eres el animador oficial de la Quiniela Paraíso, una quiniela familiar del Mundial 2026. Respondes siempre en español, con energía, calor familiar y entusiasmo. Sin emojis al inicio. Máximo 2 oraciones.",
        messages: [{
          role: "user",
          content: `Los partidos de hoy ${today} son: ${matchList}. El usuario se llama ${memberName}. Escribe UN mensaje corto y cálido para animarlo a poner su pronóstico hoy. Menciona su nombre. Máximo 2 oraciones, tono familiar y divertido.`
        }]
      })
    });
    const d1 = await r1.json();
    const txt1 = d1.content && d1.content[0] ? d1.content[0].text : "¡Hoy es tu día! Pon tus pronósticos y demuestra que sabes de fútbol.";
    const el1 = document.getElementById("aliento-text");
    if (el1) { el1.textContent = txt1; el1.classList.remove("loading-ai"); }
  } catch(e) {
    const el1 = document.getElementById("aliento-text");
    if (el1) { el1.textContent = `¡${memberName}, hoy hay fútbol! No te quedes sin poner tu pronóstico. 🎯`; el1.classList.remove("loading-ai"); }
  }

  // Curiosidad / dato interesante
  try {
    // Pick 1-2 teams from today to focus on
    const focusTeams = todayMatches.slice(0,2).map(({m}) => `${m.l} y ${m.v}`).join(", ");
    const r2 = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 120,
        system: "Eres un experto en historia del fútbol y estadísticas del Mundial. Respondes en español. Sin emojis. Máximo 2 oraciones.",
        messages: [{
          role: "user",
          content: `Partidos del día en el Mundial 2026 (${today}): ${matchList}. Dame UN dato curioso, estadística interesante o hecho histórico sobre alguno de estos equipos: ${focusTeams}. Sencillo, sorprendente y fácil de entender para toda la familia. 2 oraciones máximo.`
        }]
      })
    });
    const d2 = await r2.json();
    const txt2 = d2.content && d2.content[0] ? d2.content[0].text : "El Mundial 2026 es el primero en la historia con 48 selecciones y 3 países sede.";
    const el2 = document.getElementById("curiosidad-text");
    if (el2) { el2.textContent = txt2; el2.classList.remove("loading-ai"); }
  } catch(e) {
    const el2 = document.getElementById("curiosidad-text");
    if (el2) { el2.textContent = "El Mundial 2026 es histórico: por primera vez se juega en 3 países y con 48 selecciones."; el2.classList.remove("loading-ai"); }
  }
}

// ── ACTIONS ──
window.cyclePred = (phId, mi, targetName) => {
  const actAs = targetName || currentUser;
  if (!canActAs(actAs)) return; // safety check
  const mData = getMData(phId, mi);
  const cur = (mData.preds && mData.preds[actAs]) || "";
  const cycle = ["1","X","2",""];
  const nextVal = cycle[(cycle.indexOf(cur) + 1) % cycle.length];

  setSyncStatus("syncing");
  set(ref(db, `quiniela/${phId}/${mi}/preds/${actAs}`), nextVal || null)
    .then(() => {
      setSyncStatus("online");
      const real = getMData(phId, mi).real;
      if (real && nextVal && real === nextVal) {
        confetti();
        showToast(actAs === currentUser ? `¡Acierto! 🎉 +${PTS} pts` : `¡${actAs} acertó! 🎉 +${PTS} pts`);
      }
    }).catch(() => setSyncStatus("error"));
};

window.setReal = (phId, mi, val) => {
  setSyncStatus("syncing");
  set(ref(db, `quiniela/${phId}/${mi}/real`), val || null)
    .then(() => {
      setSyncStatus("online");
      if (val) {
        const preds = (getMData(phId, mi).preds) || {};
        const winners = MEMBERS.filter(n => preds[n] === val);
        if (winners.length) { confetti(); showToast(`¡${winners.join(" y ")} acertó! ⭐`); }
      }
    }).catch(() => setSyncStatus("error"));
};

// ── CONFETTI ──
function confetti() {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ["#f0a500","#1a5c38","#0f2342","#c0392b","#2ecc71","#3498db","#f39c12","#9b59b6","#e74c3c","#1abc9c"];
  const pieces = Array.from({length:130}, () => ({
    x: Math.random()*canvas.width, y: -20,
    vx: (Math.random()-0.5)*6, vy: Math.random()*5+2,
    color: colors[Math.floor(Math.random()*colors.length)],
    w: Math.random()*10+4, h: Math.random()*6+3,
    rot: Math.random()*360, vr: (Math.random()-0.5)*12,
  }));
  let frame = 0;
  const draw = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.06;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    });
    if (++frame < 200) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  };
  draw();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3200);
}
