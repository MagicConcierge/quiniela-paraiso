<html lang="es">

<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --navy: #0f2342;
  --navy2: #1a3560;
  --green: #1a5c38;
  --green2: #227a4a;
  --gold: #f0a500;
  --gold2: #ffd166;
  --red: #c0392b;
  --bg: #f0f2f8;
  --surface: #ffffff;
  --border: #dde1ee;
  --text: #1a1e2e;
  --muted: #6b7280;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(15,35,66,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: var(--navy);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
  gap: 1rem;
}
.loading-ball { font-size: 3.5rem; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: rgba(255,255,255,0.6); font-size: 0.9rem; font-weight: 500; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: none; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #0f2342 0%, #1a5c38 100%); padding: 1.5rem;
}
.login-card {
  background: #fff; border-radius: 24px; padding: 2rem 1.75rem;
  width: 100%; max-width: 400px; box-shadow: 0 30px 80px rgba(0,0,0,0.35);
}
.login-top { text-align: center; margin-bottom: 1.5rem; }
.login-trophy { font-size: 3.5rem; }
.login-title { font-family: 'Oswald', sans-serif; font-size: 1.9rem; color: var(--navy); margin-top: 4px; }
.login-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
.login-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
.member-btn {
  padding: 13px 8px; border-radius: 12px; border: 2px solid var(--border);
  font-size: 1rem; font-weight: 600; cursor: pointer; background: var(--bg);
  color: var(--text); transition: all 0.15s; text-align: center;
}
.member-btn:hover { border-color: var(--navy2); background: #eef2ff; transform: translateY(-1px); }
.member-btn.selected { border-color: var(--navy); background: var(--navy); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,35,66,0.3); }
.login-enter {
  width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #e09000);
  border: none; border-radius: 12px; font-family: 'Oswald', sans-serif; font-size: 1.1rem;
  font-weight: 700; color: #fff; cursor: pointer; transition: all 0.15s;
  box-shadow: 0 4px 14px rgba(240,165,0,0.4);
}
.login-enter:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(240,165,0,0.5); }
.login-enter:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }

/* ── APP HEADER ── */
#app { display: none; }
.app-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 0.9rem 1.25rem; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.25);
}
.logo { font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--gold); line-height: 1.1; }
.logo span { display: block; font-size: 0.68rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
.user-pill {
  display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 99px; padding: 6px 14px;
  cursor: pointer; transition: background 0.15s;
}
.user-pill:hover { background: rgba(255,255,255,0.18); }
.user-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }
.user-name { font-size: 0.82rem; font-weight: 600; color: #fff; }
.user-change { font-size: 0.65rem; color: rgba(255,255,255,0.4); }

/* ── SYNC BAR ── */
.sync-bar { background: var(--navy); padding: 3px 1.25rem 5px; font-size: 0.65rem; color: rgba(255,255,255,0.35); text-align: right; }
.sync-bar.syncing { color: var(--gold); }
.sync-bar.error { color: #e74c3c; }

/* ── SCOREBOARD ── */
.scoreboard-wrap { background: linear-gradient(135deg, var(--navy), var(--navy2)); padding: 0 1rem 1.25rem; }
.scores-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.scores-scroll::-webkit-scrollbar { display: none; }
.score-card {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 0.7rem 0.8rem; text-align: center; min-width: 72px;
  flex-shrink: 0; position: relative; transition: transform 0.15s;
}
.score-card.me { border-color: var(--gold); background: rgba(240,165,0,0.15); }
.score-card.leader { border-color: #2ecc71; }
.score-medal { position: absolute; top: 4px; right: 6px; font-size: 0.75rem; }
.score-name { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.3px; }
.score-pts { font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1; margin: 2px 0; }
.score-pts.gold { color: var(--gold); }
.score-lbl { font-size: 0.58rem; color: rgba(255,255,255,0.3); }

/* ── TABS ── */
.main { max-width: 600px; margin: 0 auto; padding: 1.25rem 0.9rem 5rem; }
.tabs-wrap { background: var(--surface); border-radius: 99px; padding: 4px; border: 1px solid var(--border); display: flex; gap: 3px; margin-bottom: 1.25rem; box-shadow: var(--shadow); }
.tab { flex: 1; padding: 8px 4px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.15s; text-align: center; white-space: nowrap; }
.tab.active { background: var(--navy); color: #fff; box-shadow: 0 2px 8px rgba(15,35,66,0.3); }
.tab:hover:not(.active) { background: var(--bg); color: var(--text); }
.phase-panel { display: none; }
.phase-panel.active { display: block; }

/* ── DATE DIVIDER ── */
.date-divider {
  display: flex; align-items: center; gap: 10px; margin: 1rem 0 0.6rem;
}
.date-divider-line { flex: 1; height: 1px; background: var(--border); }
.date-divider-label {
  font-size: 0.72rem; font-weight: 700; color: var(--navy); text-transform: uppercase;
  letter-spacing: 0.8px; background: var(--bg); padding: 0 4px; white-space: nowrap;
}

/* ── MATCH CARD ── */
.match-card {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.15s;
}
.match-card:hover { box-shadow: 0 4px 20px rgba(15,35,66,0.12); }
.match-card.has-result { border-color: #c8dac8; }

/* Match header */
.match-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px 0; font-size: 0.65rem; color: var(--muted); font-weight: 600;
}
.match-group-badge {
  background: var(--navy); color: #fff; font-size: 0.6rem; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.5px;
}
.match-time { font-size: 0.65rem; color: var(--muted); }

/* Teams row */
.teams-row {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center;
  padding: 10px 14px 8px;
}
.team-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.team-flag { font-size: 1.6rem; line-height: 1; }
.team-name-big { font-size: 0.82rem; font-weight: 700; color: var(--text); text-align: center; line-height: 1.2; }
.vs-bubble {
  width: 34px; height: 34px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800; color: var(--muted); flex-shrink: 0;
}
.vs-bubble.has-result { background: var(--green); border-color: var(--green); color: #fff; font-size: 0.9rem; font-weight: 900; }

/* Result selector */
.result-row {
  padding: 0 14px 10px; display: flex; align-items: center; gap: 8px;
}
.result-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.result-btns { display: flex; gap: 6px; }
.result-btn {
  padding: 7px 16px; border-radius: 8px; border: 2px solid var(--border);
  font-size: 0.85rem; font-weight: 800; cursor: pointer; background: var(--bg);
  color: var(--muted); transition: all 0.12s; font-family: 'Inter', sans-serif;
}
.result-btn:hover { border-color: var(--navy); background: #eef2ff; }
.result-btn.active-1 { background: var(--green); border-color: var(--green); color: #fff; }
.result-btn.active-X { background: var(--navy); border-color: var(--navy); color: #fff; }
.result-btn.active-2 { background: var(--red); border-color: var(--red); color: #fff; }

/* Predictions grid */
.preds-area { border-top: 1px solid var(--border); padding: 10px 14px 12px; background: #fafbff; }
.preds-title { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.preds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 6px; }
.pred-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--surface); border-radius: 10px; padding: 8px 6px;
  border: 1.5px solid var(--border); transition: all 0.12s; position: relative;
}
.pred-item.is-me { border-color: var(--navy2); background: #f0f4ff; }
.pred-item.correct { border-color: var(--gold); background: #fffbf0; }
.pred-name { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
.pred-name.is-me { color: var(--navy); }
.pred-btn-big {
  width: 100%; padding: 7px 4px; border-radius: 8px; border: 2px solid var(--border);
  font-size: 0.9rem; font-weight: 800; cursor: pointer; background: var(--bg);
  color: var(--muted); transition: all 0.12s; font-family: 'Inter', sans-serif; text-align: center;
}
.pred-btn-big.sel-1 { background: var(--green); border-color: var(--green); color: #fff; }
.pred-btn-big.sel-X { background: var(--navy); border-color: var(--navy); color: #fff; }
.pred-btn-big.sel-2 { background: var(--red); border-color: var(--red); color: #fff; }
.pred-btn-big.other { cursor: default; opacity: 0.7; }
.pred-pts { font-size: 0.68rem; font-weight: 800; color: transparent; height: 14px; }
.pred-pts.earned { color: var(--green); }
.correct-star { position: absolute; top: -5px; right: -5px; font-size: 0.75rem; }

/* Phase totals */
.phase-totals {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 12px 14px; margin-top: 4px; box-shadow: var(--shadow);
}
.phase-totals-title { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.totals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; }
.total-item { text-align: center; padding: 8px 4px; border-radius: 10px; background: var(--bg); }
.total-item.me-item { background: linear-gradient(135deg, var(--navy), var(--navy2)); }
.total-name { font-size: 0.62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
.total-name.me-n { color: rgba(255,255,255,0.7); }
.total-pts { font-family: 'Oswald', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); }
.total-pts.me-p { color: var(--gold); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--navy); color: #fff; padding: 12px 22px; border-radius: 99px;
  font-size: 0.85rem; font-weight: 600; z-index: 9998; opacity: 0;
  transition: all 0.3s; pointer-events: none; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CONFETTI ── */
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

@media (max-width: 400px) {
  .preds-grid { grid-template-columns: repeat(3, 1fr); }
  .member-btn { font-size: 0.9rem; padding: 11px 6px; }
}
</style>
</head>

// ── STATE ──
let currentUser = null;
let dbState = {};
let unsubscribe = null;

// ── LOGIN ──
window.doLogin = () => {
  const sel = document.querySelector(".member-btn.selected");
  if (!sel) return;
  currentUser = sel.dataset.name;
  localStorage.setItem("qp2_user", currentUser);
  showApp();
};

window.logout = () => {
  localStorage.removeItem("qp2_user");
  currentUser = null;
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.querySelectorAll(".member-btn").forEach(b => b.classList.remove("selected"));
  document.getElementById("login-btn").disabled = true;
};

window.selectMember = btn => {
  document.querySelectorAll(".member-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  document.getElementById("login-btn").disabled = false;
};

function buildLoginScreen() {
  document.getElementById("member-grid").innerHTML = MEMBERS.map(m =>
    `<button class="member-btn" data-name="${m}" onclick="selectMember(this)">${m}</button>`
  ).join("");
}

// ── SHOW APP ──
function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("user-badge-name").textContent = currentUser;
  buildTabs();
  subscribeDb();
}

function buildTabs() {
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");
  tabsEl.innerHTML = ""; panelsEl.innerHTML = "";
  PHASES.forEach((ph, i) => {
    const tab = document.createElement("button");
    tab.className = "tab" + (i === 0 ? " active" : "");
    tab.innerHTML = ph.label; tab.dataset.id = ph.id;
    tab.onclick = () => setTab(ph.id);
    tabsEl.appendChild(tab);

    const panel = document.createElement("div");
    panel.className = "phase-panel" + (i === 0 ? " active" : "");
    panel.id = "panel-" + ph.id;
    panelsEl.appendChild(panel);
  });
}

function setTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.id === id));
  document.querySelectorAll(".phase-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
}

// ── FIREBASE ──
function subscribeDb() {
  const dbRef = ref(db, "quiniela");
  unsubscribe = onValue(dbRef, snap => {
    dbState = snap.val() || {};
    renderAll();
    setSyncStatus("online");
  }, () => setSyncStatus("error"));
}

function setSyncStatus(s) {
  const bar = document.getElementById("sync-bar");
  if (s === "online")  { bar.textContent = "● En línea · cambios en tiempo real"; bar.className = "sync-bar"; }
  if (s === "syncing") { bar.textContent = "↑ Guardando..."; bar.className = "sync-bar syncing"; }
  if (s === "error")   { bar.textContent = "✕ Sin conexión"; bar.className = "sync-bar error"; }
}

function getMData(phId, mi) {
  return (dbState[phId] && dbState[phId][mi]) ? dbState[phId][mi] : { real: "", preds: {} };
}

// ── TOTALS ──
function getPhTotals(ph) {
  return MEMBERS.map(n => ph.matches.reduce((a, _, mi) => {
    const m = getMData(ph.id, mi);
    return a + (m.real && m.preds && m.preds[n] && m.real === m.preds[n] ? PTS : 0);
  }, 0));
}

function getAllTotals() {
  return MEMBERS.map((n, i) => PHASES.reduce((acc, ph) => acc + getPhTotals(ph)[i], 0));
}

// ── RENDER ALL ──
function renderAll() {
  renderScoreboard();
  PHASES.forEach(ph => renderPhase(ph));
}

function renderScoreboard() {
  const totals = getAllTotals();
  const max = Math.max(...totals);
  const sorted = totals.map((v, i) => ({v, i})).sort((a, b) => b.v - a.v);
  const medals = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣","🔟","1️⃣1️⃣"];
  document.getElementById("scoreboard").innerHTML = sorted.map(({v, i}) => {
    const n = MEMBERS[i], isMe = n === currentUser, rank = sorted.findIndex(x => x.i === i);
    return `<div class="score-card ${isMe?'me':''} ${v===max&&max>0&&!isMe?'leader':''}">
      <span class="score-medal">${medals[rank]}</span>
      <div class="score-name">${n}</div>
      <div class="score-pts ${isMe?'gold':''}">${v}</div>
      <div class="score-lbl">pts</div>
    </div>`;
  }).join("");
}

function renderPhase(ph) {
  const panel = document.getElementById("panel-" + ph.id);
  if (!panel) return;

  // Group by date
  const byDate = {};
  ph.matches.forEach((m, i) => {
    const d = m.f || "—";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push({m, i});
  });

  let html = "";
  Object.entries(byDate).forEach(([date, items]) => {
    html += `<div class="date-divider"><div class="date-divider-line"></div><div class="date-divider-label">📅 ${date}</div><div class="date-divider-line"></div></div>`;
    items.forEach(({m, i}) => {
      const mData = getMData(ph.id, i);
      const real = mData.real || "";
      const preds = mData.preds || {};

      // Prediction cells
      const predsHtml = MEMBERS.map(n => {
        const v = preds[n] || "";
        const isMe = n === currentUser;
        const correct = real && v && real === v;
        const pts = correct ? `+${PTS}` : "";
        if (isMe) {
          return `<div class="pred-item is-me ${correct?'correct':''}">
            ${correct ? '<span class="correct-star">⭐</span>' : ''}
            <div class="pred-name is-me">${n}</div>
            <button class="pred-btn-big ${v?'sel-'+v:''}" onclick="window.cyclePred('${ph.id}',${i})">${v||"?"}</button>
            <div class="pred-pts ${correct?'earned':''}">${pts||" "}</div>
          </div>`;
        } else {
          return `<div class="pred-item ${correct?'correct':''}">
            ${correct ? '<span class="correct-star">⭐</span>' : ''}
            <div class="pred-name">${n.substring(0,6)}</div>
            <div class="pred-btn-big other ${v?'sel-'+v:''}" style="cursor:default;display:flex;align-items:center;justify-content:center;font-size:0.88rem;${!v?'opacity:0.25;border-style:dashed':''}">${v||"·"}</div>
            <div class="pred-pts ${correct?'earned':''}">${pts||" "}</div>
          </div>`;
        }
      }).join("");

      // Result buttons
      const rBtns = ["1","X","2"].map(val =>
        `<button class="result-btn ${real===val?'active-'+val:''}" onclick="window.setReal('${ph.id}',${i},'${real===val?'':val}')">${val}</button>`
      ).join("");

      const gLabel = m.g ? `<span class="match-group-badge">Grupo ${m.g}</span>` : `<span class="match-group-badge">${ph.label.replace(/[^\w\s]/gi,'').trim()}</span>`;

      html += `<div class="match-card ${real?'has-result':''}">
        <div class="match-header">
          ${gLabel}
          <span class="match-time">⏰ ${m.h||''} hora MX</span>
        </div>
        <div class="teams-row">
          <div class="team-block">
            <div class="team-flag">${flag(m.l)}</div>
            <div class="team-name-big">${m.l}</div>
          </div>
          <div class="vs-bubble ${real?'has-result':''}">${real||"VS"}</div>
          <div class="team-block">
            <div class="team-flag">${flag(m.v)}</div>
            <div class="team-name-big">${m.v}</div>
          </div>
        </div>
        <div class="result-row">
          <div class="result-label">Resultado:</div>
          <div class="result-btns">${rBtns}</div>
          ${real ? `<span style="font-size:0.7rem;color:var(--green);font-weight:700;margin-left:4px">✓ Registrado</span>` : ''}
        </div>
        <div class="preds-area">
          <div class="preds-title">Predicciones de la familia</div>
          <div class="preds-grid">${predsHtml}</div>
        </div>
      </div>`;
    });
  });

  // Phase totals
  const pts = getPhTotals(ph);
  const totalsHtml = MEMBERS.map((n, i) => `
    <div class="total-item ${n===currentUser?'me-item':''}">
      <div class="total-name ${n===currentUser?'me-n':''}">${n.substring(0,6)}</div>
      <div class="total-pts ${n===currentUser?'me-p':''}">${pts[i]}</div>
    </div>`).join("");

  html += `<div class="phase-totals">
    <div class="phase-totals-title">Puntos en esta fase</div>
    <div class="totals-grid">${totalsHtml}</div>
  </div>`;

  panel.innerHTML = html;
}

// ── ACTIONS ──
window.cyclePred = (phId, mi) => {
  const mData = getMData(phId, mi);
  const cur = (mData.preds && mData.preds[currentUser]) || "";
  const next = (["1","X","2",""].concat())[["1","X","2",""].indexOf(cur) + 1] ?? "1";
  const cycle = ["1","X","2",""];
  const nextVal = cycle[(cycle.indexOf(cur) + 1) % cycle.length];

  setSyncStatus("syncing");
  set(ref(db, `quiniela/${phId}/${mi}/preds/${currentUser}`), nextVal || null)
    .then(() => {
      setSyncStatus("online");
      const real = getMData(phId, mi).real;
      if (real && nextVal && real === nextVal) { confetti(); showToast(`¡Acierto! 🎉 +${PTS} pts`); }
    }).catch(() => setSyncStatus("error"));
};

window.setReal = (phId, mi, val) => {
  setSyncStatus("syncing");
  set(ref(db, `quiniela/${phId}/${mi}/real`), val || null)
    .then(() => {
      setSyncStatus("online");
      if (val) {
        const preds = (getMData(phId, mi).preds) || {};
        const winners = MEMBERS.filter(n => preds[n] === val);
        if (winners.length) { confetti(); showToast(`¡${winners.join(" y ")} acertó! ⭐`); }
      }
    }).catch(() => setSyncStatus("error"));
};

// ── CONFETTI ──
function confetti() {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ["#f0a500","#1a5c38","#0f2342","#c0392b","#2ecc71","#3498db","#f39c12","#9b59b6","#e74c3c","#1abc9c"];
  const pieces = Array.from({length:130}, () => ({
    x: Math.random()*canvas.width, y: -20,
    vx: (Math.random()-0.5)*6, vy: Math.random()*5+2,
    color: colors[Math.floor(Math.random()*colors.length)],
    w: Math.random()*10+4, h: Math.random()*6+3,
    rot: Math.random()*360, vr: (Math.random()-0.5)*12,
  }));
  let frame = 0;
  const draw = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.06;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    });
    if (++frame < 200) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  };
  draw();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3200);
}

// ── INIT ──
buildLoginScreen();
document.getElementById("loading").style.display = "none";
const saved = localStorage.getItem("qp2_user");
if (saved && MEMBERS.includes(saved)) {
  currentUser = saved;
  document.getElementById("login-screen").style.display = "none";
  showApp();
} else {
  document.getElementById("login-screen").style.display = "flex";
}
